<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Result Card</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    padding:20px;
}

.card{
    width:800px;
    margin:auto;
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0px 0px 20px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#007bff;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#007bff;
    color:white;
}

.pass{
    color:green;
    font-weight:bold;
    font-size:20px;
}

.fail{
    color:red;
    font-weight:bold;
    font-size:20px;
}

.btn{
    margin-top:20px;
    padding:10px 20px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

.btn:hover{
    background:#0056b3;
}

.message{
    text-align:center;
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="result"></div>

<script>

let name = prompt("Enter Student Name");
let rollNo = prompt("Enter Roll Number");

let english = Number(prompt("English Marks"));
let math = Number(prompt("Math Marks"));
let science = Number(prompt("Science Marks"));
let computer = Number(prompt("Computer Marks"));
let urdu = Number(prompt("Urdu Marks"));

let total = english + math + science + computer + urdu;
let average = total / 5;
let percentage = (total / 500) * 100;

let grade;
let status;

if(
    english >= 40 &&
    math >= 40 &&
    science >= 40 &&
    computer >= 40 &&
    urdu >= 40
){
    status = "PASS";

    if(percentage >= 90) grade="A+";
    else if(percentage >= 80) grade="A";
    else if(percentage >= 70) grade="B";
    else if(percentage >= 60) grade="C";
    else grade="D";
}
else{
    status="FAIL";
    grade="F";
}

let message =
status=="PASS"
? "🎉🎉 Congratulations! You Passed."
: "❌ Better Luck Next Time.";

let color =
status=="PASS"
? "pass"
: "fail";

document.getElementById("result").innerHTML = `

<div class="card">

<h1>STUDENT RESULT CARD</h1>

<h3>Name: ${name}</h3>
<h3>Roll No: ${rollNo}</h3>

<table>

<tr>
<th>Subject</th>
<th>Marks</th>
</tr>

<tr><td>English</td><td>${english}</td></tr>
<tr><td>Math</td><td>${math}</td></tr>
<tr><td>Science</td><td>${science}</td></tr>
<tr><td>Computer</td><td>${computer}</td></tr>
<tr><td>Urdu</td><td>${urdu}</td></tr>

<tr>
<th>Total</th>
<th>${total}/500</th>
</tr>

<tr>
<th>Average</th>
<th>${average.toFixed(2)}</th>
</tr>

<tr>
<th>Percentage</th>
<th>${percentage.toFixed(2)}%</th>
</tr>

<tr>
<th>Grade</th>
<th>${grade}</th>
</tr>

<tr>
<th>Status</th>
<th class="${color}">
${status}
</th>
</tr>

</table>

<div class="message ${color}">
${message}
</div>

<center>
<button class="btn" onclick="window.print()">
Print Result
</button>
</center>

</div>

`;

</script>

</body>
</html>
