<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="reg.css">
</head>
<body>
    <script src="reg.js"></script>
    <div class="container">
    <h1>🎓 Student Result System</h1>

    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="roll" placeholder="Roll Number">

    <input type="number" id="sub1" placeholder="English Marks">
    <input type="number" id="sub2" placeholder="Math Marks">
    <input type="number" id="sub3" placeholder="Science Marks">
    <input type="number" id="sub4" placeholder="Computer Marks">
    <input type="number" id="sub5" placeholder="Urdu Marks">

    <button onclick="generateResult()">Generate Result</button>
    <button onclick="window.print()">Print</button>

    <div id="result"></div>
</div>
</body>
</html>
